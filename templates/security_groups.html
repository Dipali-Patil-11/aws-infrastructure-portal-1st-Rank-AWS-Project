{% extends 'base.html' %}
{% block title %}Security Groups{% endblock %}
{% block page_title %}Security Groups{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center py-3">
        <h5 class="mb-0 fw-bold"><i class="fas fa-shield-alt me-2"></i>Security Groups</h5>
        <div>
            <button class="btn btn-outline-secondary me-2" onclick="loadSGs()"><i class="fas fa-sync-alt"></i> Refresh</button>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal"><i class="fas fa-plus"></i> Create Group</button>
        </div>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0" id="sg-table">
                <thead class="table-light">
                    <tr>
                        <th>Group Name</th>
                        <th>Group ID</th>
                        <th>Description</th>
                        <th>VPC ID</th>
                        <th>Rules (In/Out)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="6" class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Create Modal -->
<div class="modal fade" id="createModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content glass">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">Create Security Group</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" id="sgName" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <input type="text" class="form-control" id="sgDesc" required>
        </div>
        <div class="mb-3">
            <label class="form-label">VPC ID (Optional)</label>
            <input type="text" class="form-control" id="sgVpc" placeholder="vpc-xxxxxx">
        </div>
      </div>
      <div class="modal-footer border-top-0">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="submitCreate()"><i class="fas fa-check"></i> Create</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function loadSGs() {
        const tbody = document.querySelector('#sg-table tbody');
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></td></tr>';
        try {
            const data = await apiGet('/api/security_groups/list');
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No security groups found.</td></tr>';
                return;
            }
            let html = '';
            data.forEach(sg => {
                html += `
                    <tr>
                        <td class="fw-bold">${sg.name}</td>
                        <td><span class="text-muted font-monospace">${sg.id}</span></td>
                        <td>${sg.description}</td>
                        <td>${sg.vpc_id}</td>
                        <td><span class="badge bg-success">${sg.inbound_rules} In</span> <span class="badge bg-info">${sg.outbound_rules} Out</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger" title="Delete" onclick="deleteSG('${sg.id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        } catch(e) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-danger">Error: ${e.message}</td></tr>`;
        }
    }

    async function submitCreate() {
        const name = document.getElementById('sgName').value;
        const desc = document.getElementById('sgDesc').value;
        const vpc = document.getElementById('sgVpc').value;
        
        try {
            bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
            await apiPost('/api/security_groups/create', { group_name: name, description: desc, vpc_id: vpc });
            showToast('Success', 'Security Group created');
            setTimeout(loadSGs, 1500);
        } catch (e) { showToast('Error', e.message, 'error'); }
    }

    async function deleteSG(id) {
        if(!confirm(`Are you sure you want to delete security group ${id}?`)) return;
        try {
            await apiDelete('/api/security_groups/delete', { group_id: id });
            showToast('Success', 'Security Group deleted');
            setTimeout(loadSGs, 1500);
        } catch (e) { showToast('Error', e.message, 'error'); }
    }

    document.addEventListener("DOMContentLoaded", loadSGs);
</script>
{% endblock %}
