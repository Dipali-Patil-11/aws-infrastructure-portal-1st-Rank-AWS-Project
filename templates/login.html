<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cloud Portal</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="login-container">
    <div class="card login-card glass text-center">
        <div class="card-body">
            <i class="fab fa-aws fa-4x mb-3 text-primary"></i>
            <h3 class="fw-bold mb-4">Cloud Portal Login</h3>
            
            {% if error %}
            <div class="alert alert-danger py-2" role="alert">
                <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="access_key" name="access_key" placeholder="AKIAIOSFODNN7EXAMPLE" required>
                    <label for="access_key" style="color: var(--secondary-color)">AWS Access Key ID</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="secret_key" name="secret_key" placeholder="wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY" required>
                    <label for="secret_key" style="color: var(--secondary-color)">AWS Secret Access Key</label>
                </div>
                <div class="form-floating mb-4">
                    <select class="form-select" id="region" name="region" required>
                        <option value="ap-south-1" selected>ap-south-1 (Mumbai)</option>
                        <option value="us-east-1">us-east-1 (N. Virginia)</option>
                        <option value="us-west-2">us-west-2 (Oregon)</option>
                        <option value="eu-west-1">eu-west-1 (Ireland)</option>
                    </select>
                    <label for="region" style="color: var(--secondary-color)">AWS Region</label>
                </div>
                
                <div class="alert alert-info py-2 text-start" role="alert" style="font-size: 0.85rem;">
                    <i class="fas fa-shield-alt me-2"></i><strong>Privacy First:</strong> Your credentials are used exclusively to generate a secure, temporary 1-hour session. They are never logged or stored permanently.
                </div>

                <button class="btn btn-primary w-100 py-2 fw-bold" type="submit">Authenticate Session</button>
            </form>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
