{% extends "base.html" %}

{% block page_title %}RDS Management{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">Relational Database Service (RDS)</h4>
    <button class="btn btn-primary" onclick="loadRDS()"><i class="fas fa-sync-alt me-2"></i>Refresh</button>
</div>

<div class="row g-4" id="rds-container">
    <div class="col-12 text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2 text-muted">Fetching databases from AWS...</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadRDS() {
    const container = document.getElementById('rds-container');
    container.innerHTML = `
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">Fetching databases from AWS...</p>
        </div>
    `;
    
    try {
        const databases = await apiGet('/api/rds/list');
        
        if (databases.error) {
            container.innerHTML = `<div class="col-12"><div class="alert alert-danger">${databases.error}</div></div>`;
            return;
        }

        if (databases.length === 0) {
            container.innerHTML = `
                <div class="col-12">
                    <div class="alert alert-info d-flex align-items-center glass border-0" role="alert">
                        <i class="fas fa-info-circle fa-2x me-3 text-info"></i>
                        <div>
                            <h5 class="mb-1 fw-bold">No RDS Instances Found</h5>
                            <div>No databases exist in your current region.</div>
                        </div>
                    </div>
                </div>
            `;
            return;
        }

        let html = '';
        databases.forEach(db => {
            const statusColor = db.status === 'available' ? 'success' : (db.status === 'stopped' ? 'danger' : 'warning');
            
            html += `
                <div class="col-md-4">
                    <div class="card h-100 shadow-sm glass border-0">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <h5 class="card-title fw-bold text-primary mb-1">${db.id}</h5>
                                    <span class="badge bg-${statusColor} bg-opacity-25 text-${statusColor} border border-${statusColor} rounded-pill">
                                        <i class="fas fa-circle me-1" style="font-size: 0.5rem; vertical-align: middle;"></i>${db.status.toUpperCase()}
                                    </span>
                                </div>
                                <div class="bg-primary bg-opacity-10 p-2 rounded text-primary">
                                    <i class="fas fa-database fa-lg"></i>
                                </div>
                            </div>
                            
                            <ul class="list-unstyled mb-0 small text-muted">
                                <li class="mb-2"><i class="fas fa-microchip me-2"></i><strong>Engine:</strong> ${db.engine} (${db.engine_version})</li>
                                <li class="mb-2"><i class="fas fa-server me-2"></i><strong>Class:</strong> ${db.class}</li>
                                <li class="mb-2"><i class="fas fa-hdd me-2"></i><strong>Storage:</strong> ${db.storage}</li>
                                <li class="text-truncate"><i class="fas fa-link me-2"></i><strong>Endpoint:</strong> <span title="${db.endpoint}">${db.endpoint}</span></li>
                            </ul>
                        </div>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
        
    } catch (e) {
        container.innerHTML = `<div class="col-12"><div class="alert alert-danger">Error loading RDS instances: ${e}</div></div>`;
    }
}

document.addEventListener('DOMContentLoaded', loadRDS);
</script>
{% endblock %}
