{% extends 'base.html' %}
{% block title %}Activity Logs{% endblock %}
{% block page_title %}Infrastructure Activity Logs{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center py-3">
        <h5 class="mb-0 fw-bold"><i class="fas fa-history me-2"></i>Recent Activity</h5>
        <div>
            <button class="btn btn-outline-secondary btn-sm" onclick="loadLogs()"><i class="fas fa-sync-alt"></i> Refresh</button>
            <button class="btn btn-outline-success btn-sm"><i class="fas fa-file-csv"></i> Export CSV</button>
        </div>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive" style="max-height: 600px; overflow-y: auto;">
            <table class="table table-hover mb-0" id="logs-table">
                <thead class="table-light sticky-top">
                    <tr>
                        <th>Timestamp</th>
                        <th>User</th>
                        <th>Resource</th>
                        <th>Action</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5" class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function loadLogs() {
        const tbody = document.querySelector('#logs-table tbody');
        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></td></tr>';
        try {
            const data = await apiGet('/api/logs/');
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">No logs found.</td></tr>';
                return;
            }
            let html = '';
            data.forEach(log => {
                let statusClass = log.status === 'Success' ? 'text-success' : (log.status.includes('Error') ? 'text-danger' : 'text-warning');
                
                // Format timestamp
                let date = new Date(log.timestamp);
                let formattedTime = isNaN(date.getTime()) ? log.timestamp : date.toLocaleString();
                
                html += `
                    <tr>
                        <td class="text-muted"><small>${formattedTime}</small></td>
                        <td><strong>${log.user}</strong></td>
                        <td><span class="badge bg-secondary">${log.resource}</span></td>
                        <td>${log.action}</td>
                        <td class="fw-bold ${statusClass}">${log.status}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        } catch(e) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-danger">Error: ${e.message}</td></tr>`;
        }
    }

    document.addEventListener("DOMContentLoaded", loadLogs);
</script>
{% endblock %}
