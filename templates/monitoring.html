{% extends 'base.html' %}
{% block title %}CloudWatch Monitoring{% endblock %}
{% block page_title %}Infrastructure Monitoring{% endblock %}

{% block content %}
<div class="row g-4 mb-4">
    <div class="col-md-12">
        <div class="card h-100">
            <div class="card-header fw-bold py-3"><i class="fas fa-microchip me-2"></i>EC2 CPU Utilization (Last 1 Hour)</div>
            <div class="card-body">
                <div class="input-group mb-3 w-50">
                    <input type="text" class="form-control" id="instanceIdInput" placeholder="Enter Instance ID (e.g., i-0abcd1234)">
                    <button class="btn btn-primary" type="button" onclick="loadCPUMetrics()"><i class="fas fa-search"></i> Monitor</button>
                </div>
                <div style="height: 350px;">
                    <canvas id="cpuChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let cpuChart;
    
    async function loadCPUMetrics() {
        const instanceId = document.getElementById('instanceIdInput').value;
        if(!instanceId) return showToast('Error', 'Instance ID is required', 'error');
        
        try {
            const data = await apiGet(`/api/monitoring/ec2_cpu?instance_id=${instanceId}`);
            
            const ctx = document.getElementById('cpuChart');
            if(cpuChart) cpuChart.destroy();
            
            cpuChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.times,
                    datasets: [{
                        label: `CPU Utilization (%) - ${instanceId}`,
                        data: data.values,
                        borderColor: '#0d6efd',
                        backgroundColor: 'rgba(13, 110, 253, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, max: 100 } }
                }
            });
            updateChartsTheme();
        } catch(e) {
            showToast('Error', 'Failed to load metrics: ' + e.message, 'error');
        }
    }
</script>
{% endblock %}
